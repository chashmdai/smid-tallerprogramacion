# ==========================================
# CONFIGURACIÓN DEL SERVIDOR
# ==========================================
server.port=8081
spring.application.name=auth-service
spring.threads.virtual.enabled=true

# ==========================================
# CONEXIÓN A BASE DE DATOS (MySQL 8)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/db_auth?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=patsYned24
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA e Hibernate
# 'validate' valida que las tablas existan (las creamos en el script SQL).
# No uses 'update' en producción/institucional.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# CONFIGURACIÓN JWT
# ==========================================
# Llave secreta súper segura (Debe tener al menos 256 bits / 32 caracteres).
# ¡Ojo! En producción, esto debe ir en una variable de entorno, no en texto plano.
jwt.secret=DefensoriaSmid2026SecretKeyHS256!
# Tiempo de expiración del token (Ej: 8 horas = 28800000 milisegundos)
jwt.expiration=28800000

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/auth